<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Email Analytics — TerraTern</title>
<link rel="icon" type="image/png" href="https://terratern.com/images/favicon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#00215C;--blue:#255CC1;--bg:#f0f4fb;--surface:#fff;--border:#dde6f5;--text:#00215C;--muted:#5a7ab5;--green:#1a9e5c;--red:#e03e3e;--font:'Inter',system-ui,sans-serif;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.header{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo img{height:26px}.sub{font-size:11px;color:#9acbfd;letter-spacing:1px;text-transform:uppercase;flex:1}
.nav-link{font-size:11px;color:#9acbfd;text-decoration:none;border:1px solid rgba(154,203,253,.3);padding:5px 12px;border-radius:6px}
.nav-link:hover{background:rgba(154,203,253,.15)}
.page{padding:20px;max-width:1100px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:800;color:var(--navy)}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue);padding:6px 14px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;border-radius:6px}
.campaigns-table{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 14px;background:#f0f4fb;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1.5px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid #f0f4fb;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff;cursor:pointer}
.stat{font-weight:700}
.stat.green{color:var(--green)}.stat.blue{color:var(--blue)}.stat.red{color:var(--red)}.stat.amber{color:#b07d00}
.pct{font-size:10px;color:var(--muted);margin-left:4px}
.detail-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}
.detail-header{padding:12px 16px;background:#f0f4fb;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-title{font-size:12px;font-weight:700;color:var(--navy)}
.close-btn{background:transparent;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(37,92,193,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
.empty{padding:40px;text-align:center;font-size:13px;color:var(--muted)}
.tab-nav{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
.tab-nav a{font-size:12px;font-weight:600;color:rgba(154,203,253,.7);text-decoration:none;padding:6px 14px;border-radius:20px;transition:all .15s;white-space:nowrap}
.tab-nav a:hover{color:#fff}
.tab-nav a.active{background:#fff;color:var(--navy)}
.smtp-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;flex-shrink:0}
.smtp-pill.live{background:rgba(26,158,92,.2);color:#4ade80}
.smtp-pill.down{background:rgba(224,62,62,.2);color:#f87171}
.smtp-pill.checking{background:rgba(154,203,253,.15);color:rgba(154,203,253,.7)}
.smtp-modal{display:none;position:fixed;top:52px;right:16px;background:#1a2744;border:1.5px solid rgba(154,203,253,.2);border-radius:10px;padding:14px 16px;z-index:100;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.smtp-modal.show{display:block}
.smtp-modal-title{font-size:10px;font-weight:700;color:rgba(154,203,253,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.smtp-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(154,203,253,.1)}
.smtp-row:last-child{border-bottom:none}
.smtp-key{color:rgba(154,203,253,.6)}.smtp-val{color:#fff;font-weight:600}
.smtp-err{font-size:11px;color:#f87171;margin-top:8px;padding-top:8px;border-top:1px solid rgba(154,203,253,.1)}

[data-theme='dark']{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--navy:#1e293b}
[data-theme='dark'] .header{background:#0f172a}
[data-theme='dark'] .tab-nav a.active{background:#e2e8f0;color:#0f172a}
.theme-btn{background:transparent;border:1px solid rgba(154,203,253,.3);color:rgba(154,203,253,.8);padding:5px 10px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--font);flex-shrink:0}
.theme-btn:hover{background:rgba(154,203,253,.15)}
</style>


</head>
<body>
<div class="header">
  <div class="logo"><img src="https://terratern.com/images/favicon_192.png" alt="TerraTern"/></div>
  <div class="sub">Email Analytics</div>
<nav class="tab-nav">
  <a href="/email-home.html" class="">🏠 Home</a>
  <a href="/contacts.html" class="">👥 Contacts</a>
  <a href="/compose.html" class="">✏️ Compose</a>
  <a href="/analytics.html" class="active">📊 Analytics</a>
</nav>
<button class="smtp-pill checking" id="smtp-pill" onclick="toggleSMTPModal()"><span class="spin"></span> SMTP</button>
<div class="smtp-modal" id="smtp-modal">
  <div class="smtp-modal-title">SMTP Connection</div>
  <div class="smtp-row"><span class="smtp-key">Host</span><span class="smtp-val">node21.urmailtechno.com</span></div>
  <div class="smtp-row"><span class="smtp-key">Port</span><span class="smtp-val">587</span></div>
  <div class="smtp-row"><span class="smtp-key">Domain</span><span class="smtp-val">marketing.terratern.in</span></div>
  <div class="smtp-row"><span class="smtp-key">User</span><span class="smtp-val">user_teratern</span></div>
  <div class="smtp-err" id="smtp-err" style="display:none"></div>
</div>
</div>

<div class="page">
  <div class="page-header">
    <div class="page-title">Campaign Analytics</div>
    <button class="btn-ghost" onclick="load()">↻ Refresh</button>
  </div>

  <div class="campaigns-table">
    <table>
      <thead>
        <tr>
          <th>Campaign</th>
          <th>Date</th>
          <th>Sent</th>
          <th>Opened</th>
          <th>Clicked</th>
          <th>Failed</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="6" class="empty"><span class="spin"></span>Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <span class="detail-title" id="detail-title">Contact Details</span>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <table>
      <thead><tr><th>Email</th><th>Status</th><th>Opened</th><th>Clicked</th><th>Sent At</th></tr></thead>
      <tbody id="detail-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const SB = 'https://oagsgovnxgiszofgytre.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hZ3Nnb3ZueGdpc3pvZmd5dHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzA1MjgsImV4cCI6MjA5NjEwNjUyOH0.V3eNIE3PXAcMuS3Gv0tBb3kqjVRAI25tSj8ED5W7vmI';
const sbH = { apikey:KEY, Authorization:`Bearer ${KEY}` };

async function load() {
  // Fetch drafts for names
  const dr = await fetch('/api/email/drafts').then(r=>r.json());
  const draftMap = {};
  (dr.drafts||[]).forEach(d=>draftMap[d.id]=d.campaign_name||'Untitled');

  // Fetch sends grouped by draft_id
  const r = await fetch(`${SB}/rest/v1/email_sends?select=draft_id,status,opened_at,clicked_at,sent_at&order=sent_at.desc&limit=2000`, {headers:sbH});
  const rows = await r.json();

  if (!Array.isArray(rows)||!rows.length) {
    document.getElementById('tbody').innerHTML='<tr><td colspan="6" class="empty">No campaigns sent yet</td></tr>';
    return;
  }

  // Group by draft_id + date
  const groups = {};
  rows.forEach(r=>{
    const date = r.sent_at?.split('T')[0]||'';
    const key = `${r.draft_id}__${date}`;
    if (!groups[key]) groups[key]={draft_id:r.draft_id,date,sent:0,opened:0,clicked:0,failed:0,rows:[]};
    groups[key].sent++;
    if (r.status==='failed') groups[key].failed++;
    if (r.opened_at) groups[key].opened++;
    if (r.clicked_at) groups[key].clicked++;
    groups[key].rows.push(r);
  });

  const sorted = Object.values(groups).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('tbody').innerHTML = sorted.map(g=>`
    <tr onclick="showDetail(${JSON.stringify(JSON.stringify(g.rows))}, '${draftMap[g.draft_id]||'Untitled'}')">
      <td style="font-weight:700">${esc(draftMap[g.draft_id]||g.draft_id)}</td>
      <td style="color:var(--muted)">${g.date}</td>
      <td><span class="stat">${g.sent}</span></td>
      <td><span class="stat green">${g.opened}</span><span class="pct">${pct(g.opened,g.sent)}</span></td>
      <td><span class="stat blue">${g.clicked}</span><span class="pct">${pct(g.clicked,g.sent)}</span></td>
      <td><span class="stat red">${g.failed}</span><span class="pct">${pct(g.failed,g.sent)}</span></td>
    </tr>
  `).join('');
}

function showDetail(rowsJson, name) {
  const rows = JSON.parse(rowsJson);
  document.getElementById('detail-title').textContent = name + ' — Contact Details';
  document.getElementById('detail-tbody').innerHTML = rows.map(r=>`
    <tr>
      <td>${esc(r.email||'—')}</td>
      <td><span style="font-size:10px;font-weight:700;color:${r.status==='sent'?'var(--green)':'var(--red)'}">${r.status?.toUpperCase()}</span></td>
      <td>${r.opened_at?'✅ '+new Date(r.opened_at).toLocaleTimeString('en-IN'):'—'}</td>
      <td>${r.clicked_at?'✅ '+new Date(r.clicked_at).toLocaleTimeString('en-IN'):'—'}</td>
      <td style="color:var(--muted)">${r.sent_at?new Date(r.sent_at).toLocaleString('en-IN'):'—'}</td>
    </tr>
  `).join('');
  document.getElementById('detail-panel').style.display='block';
}

function closeDetail(){document.getElementById('detail-panel').style.display='none';}
function pct(a,b){return b?`(${Math.round(a/b*100)}%)`:'(0%)';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.onload=load;
</script>
<script>
window.toggleSMTPModal = function(){
  document.getElementById('smtp-modal').classList.toggle('show');
};
document.addEventListener('click', function(e){
  const modal = document.getElementById('smtp-modal');
  const pill = document.getElementById('smtp-pill');
  if(modal && !modal.contains(e.target) && e.target !== pill) modal.classList.remove('show');
});
async function checkSMTP(){
  const pill = document.getElementById('smtp-pill');
  const errEl = document.getElementById('smtp-err');
  if(!pill) return;
  try{
    const ctrl = new AbortController();
    setTimeout(()=>ctrl.abort(), 8000);
    const r = await fetch('/api/email-sync', {signal:ctrl.signal});
    const d = await r.json();
    pill.className = 'smtp-pill '+(d.live?'live':'down');
    pill.innerHTML = d.live?'🟢 SMTP Live':'🔴 SMTP Down';
    if(errEl){errEl.textContent=d.live?'':(d.message||'Failed');errEl.style.display=d.live?'none':'block';}
  }catch(e){
    pill.className='smtp-pill down';
    pill.innerHTML='🔴 SMTP Down';
    if(errEl){errEl.textContent=e.name==='AbortError'?'Timed out':e.message;errEl.style.display='block';}
  }
}
checkSMTP();
</script>
</body>
</html>
