<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Email — TerraTern</title>
<link rel="icon" type="image/png" href="https://terratern.com/images/favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#00215C;--blue:#255CC1;--green:#1a9e5c;--red:#e03e3e;--bg:#f0f4fb;--surface:#fff;--border:#dde6f5;--text:#00215C;--muted:#5a7ab5;--font:'Inter',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.logo img{height:26px}
.sub{font-size:11px;color:#9acbfd;letter-spacing:1px;text-transform:uppercase;flex:1}
.nav-link{font-size:11px;color:#9acbfd;text-decoration:none;border:1px solid rgba(154,203,253,.3);padding:5px 12px;border-radius:6px}
.nav-link:hover{background:rgba(154,203,253,.15)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:40px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,33,92,.08)}
.card-title{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.status-badge{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:8px;margin-bottom:24px;border:1.5px solid}
.status-badge.live{background:#e8f5e9;border-color:#a5d6a7}
.status-badge.down{background:#fdecea;border-color:#fca5a5}
.status-badge.checking{background:#f0f5ff;border-color:var(--border)}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.status-badge.live .status-dot{background:var(--green)}
.status-badge.down .status-dot{background:var(--red)}
.status-badge.checking .status-dot{background:var(--muted);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-size:14px;font-weight:700}
.status-badge.live .status-text{color:var(--green)}
.status-badge.down .status-text{color:var(--red)}
.status-badge.checking .status-text{color:var(--muted)}
.status-msg{font-size:11px;color:var(--muted);margin-top:3px}
.config-grid{display:grid;gap:10px;margin-bottom:24px}
.config-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.config-val{font-size:12px;font-weight:700;color:var(--text)}
.btn{background:var(--blue);color:#fff;border:none;padding:12px 24px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;border-radius:8px;width:100%;transition:all .15s}
.btn:hover{background:var(--navy)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.last-checked{font-size:11px;color:var(--muted);text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><img src="https://terratern.com/images/favicon_192.png" alt="TerraTern"/></div>
  <div class="sub">Email</div>
  <a href="/automation.html" class="nav-link">← Automation</a>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">SMTP Connection</div>

    <div class="status-badge checking" id="status-badge">
      <div>
        <div class="status-dot"></div>
      </div>
      <div>
        <div class="status-text" id="status-text">Checking...</div>
        <div class="status-msg" id="status-msg">Testing SMTP connection</div>
      </div>
    </div>

    <div class="config-grid">
      <div class="config-row">
        <span class="config-label">Host</span>
        <span class="config-val">node21.urmailtechno.com</span>
      </div>
      <div class="config-row">
        <span class="config-label">Port</span>
        <span class="config-val">587</span>
      </div>
      <div class="config-row">
        <span class="config-label">Domain</span>
        <span class="config-val">marketing.terratern.in</span>
      </div>
      <div class="config-row">
        <span class="config-label">User</span>
        <span class="config-val">user_teratern</span>
      </div>
      <div class="config-row">
        <span class="config-label">Tenant</span>
        <span class="config-val">teratern</span>
      </div>
    </div>

    <button class="btn" id="test-btn" onclick="testConnection()">↻ Test Connection</button>
    <div class="last-checked" id="last-checked"></div>
  </div>
</div>

<script>
async function testConnection() {
  const badge = document.getElementById('status-badge');
  const text = document.getElementById('status-text');
  const msg = document.getElementById('status-msg');
  const btn = document.getElementById('test-btn');
  const lastChecked = document.getElementById('last-checked');

  badge.className = 'status-badge checking';
  text.textContent = 'Checking...';
  msg.textContent = 'Testing SMTP connection';
  btn.disabled = true;

  try {
    const res = await fetch('/api/email-sync');
    const data = await res.json();
    if (data.live) {
      badge.className = 'status-badge live';
      text.textContent = '🟢 Live';
      msg.textContent = data.message || 'SMTP connection successful';
    } else {
      badge.className = 'status-badge down';
      text.textContent = '🔴 Down';
      msg.textContent = data.message || 'SMTP connection failed';
    }
  } catch(e) {
    badge.className = 'status-badge down';
    text.textContent = '🔴 Down';
    msg.textContent = 'Failed to reach API: ' + e.message;
  }

  const now = new Date(Date.now() + 330*60000);
  lastChecked.textContent = `Last checked: ${now.toLocaleTimeString('en-IN')} IST`;
  btn.disabled = false;
}

window.onload = testConnection;
</script>
</body>
</html>
