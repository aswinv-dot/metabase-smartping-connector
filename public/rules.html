<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Campaign Rulesets — TerraTern</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#00215C;--blue:#255CC1;--sky:#9acbfd;--yellow:#f1c819;
  --white:#ffffff;--bg:#f4f7fc;--surface:#ffffff;--border:#dde6f5;
  --text:#00215C;--muted:#5a7ab5;--muted2:#8aa4cc;
  --green:#1a9e5c;--red:#e03e3e;--amber:#b07d00;
  --font:'Inter',system-ui,sans-serif;--radius:8px;--shadow:0 1px 4px rgba(0,33,92,.08);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:80px}
.header{background:var(--navy);padding:0 32px;height:56px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,33,92,.15)}
.logo{font-size:18px;font-weight:800;letter-spacing:2px;color:#fff}.logo span{color:var(--yellow)}
.sub{font-size:11px;color:var(--sky);letter-spacing:1px;text-transform:uppercase;flex:1}
.nav-link{font-size:12px;color:var(--sky);text-decoration:none;border:1px solid rgba(154,203,253,.3);padding:6px 14px;border-radius:6px;transition:all .15s}
.nav-link:hover{background:rgba(154,203,253,.15);border-color:var(--sky)}
.layout{display:grid;grid-template-columns:500px 1fr;gap:20px;padding:24px 32px;max-width:1400px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px}
.sec-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:600}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:#fff;outline:none;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--blue)}

/* FETCH BAR */
.fetch-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f0f7ff;border:1.5px solid var(--sky);border-radius:var(--radius);margin-bottom:16px}
.fetch-status{font-size:11px;color:var(--muted);flex:1;font-weight:500}
.fetch-status.ok{color:var(--green)}.fetch-status.err{color:var(--red)}
.fetch-btn{background:var(--blue);color:#fff;border:none;padding:7px 16px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;border-radius:6px;transition:all .15s;white-space:nowrap}
.fetch-btn:hover{background:var(--navy)}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed}

/* FILTER ROWS */
.filter-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.filter-row{border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;background:#fafcff}
.filter-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.filter-bottom{display:grid;grid-template-columns:1fr 30px;gap:6px;align-items:center}
.filter-row select{border:1.5px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:var(--font);font-size:12px;outline:none;width:100%;background:#fff;appearance:none}
.filter-row select:focus{border-color:var(--blue)}
.filter-row select:disabled{opacity:.4;cursor:not-allowed;background:#f5f5f5}
.logic-toggle{display:flex;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
.lt-btn{background:#fff;border:none;color:var(--muted);padding:5px 10px;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:700;transition:all .15s;width:36px;text-align:center}
.lt-btn.active{background:var(--blue);color:#fff}
.lt-spacer{width:72px;flex-shrink:0}
.remove-btn{background:transparent;border:1.5px solid #fca5a5;color:var(--red);width:30px;height:32px;cursor:pointer;font-size:14px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.remove-btn:hover{background:#fdecea}
.add-filter-btn{background:transparent;border:1.5px dashed var(--border);color:var(--muted);padding:8px 14px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;border-radius:6px;width:100%;transition:all .15s;margin-bottom:14px}
.add-filter-btn:hover{border-color:var(--blue);color:var(--blue)}

/* BUTTONS */
.btn{background:var(--blue);color:#fff;border:none;padding:10px 24px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;border-radius:6px;transition:all .15s}
.btn:hover{background:var(--navy)}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue);padding:9px 16px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;border-radius:6px;transition:all .15s}
.btn-ghost:hover{background:var(--blue);color:#fff}
.btn-preview{background:transparent;color:var(--amber);border:1.5px solid var(--yellow);padding:9px 16px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;border-radius:6px;transition:all .15s}
.btn-preview:hover{background:var(--yellow);color:var(--navy)}
.btn-preview:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid #fca5a5;padding:5px 12px;cursor:pointer;font-family:var(--font);font-size:11px;border-radius:6px;transition:all .15s}
.btn-danger:hover{background:#fdecea}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}

/* PREVIEW */
.preview-box{background:#f0f7ff;border:1.5px solid var(--sky);border-radius:var(--radius);padding:14px 16px;margin-top:12px}
.preview-count{font-size:32px;font-weight:800;color:var(--blue)}
.preview-sublabel{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.preview-table-wrap{max-height:200px;overflow-y:auto;margin-top:10px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.preview-table{width:100%;border-collapse:collapse;font-size:11px}
.preview-table th{padding:7px 10px;background:#e8f0ff;color:var(--navy);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left;font-weight:700}
.preview-table td{padding:7px 10px;border-bottom:1px solid #f0f4fb;color:var(--muted)}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:#f8faff}

/* RULES LIST */
.rules-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.rules-toolbar .sec-label{margin-bottom:0;flex:1}
.rule-card{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;transition:border-color .2s}
.rule-card.active-rule{border-color:var(--blue)}
.rule-card-header{background:linear-gradient(135deg,var(--navy),var(--blue));padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.rule-card-name{font-size:13px;font-weight:700;color:#fff}
.rule-card-campaign{font-size:10px;color:var(--sky);margin-top:2px}
.status-badge{font-size:9px;padding:3px 10px;border-radius:20px;letter-spacing:1px;cursor:pointer;border:1px solid transparent;font-family:var(--font);font-weight:700}
.status-badge.active{background:rgba(241,200,25,.2);color:var(--yellow);border-color:rgba(241,200,25,.4)}
.status-badge.paused{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.2)}
.rule-card-body{padding:12px 16px;display:flex;flex-direction:column;gap:4px;background:#fafcff}
.rule-filter-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#e8f0ff;border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted)}
.rule-filter-pill .rfield{color:var(--navy);font-weight:600}
.rule-filter-pill .rop{color:var(--blue);font-size:10px}
.rule-filter-pill .rval{color:var(--blue);font-weight:600}
.rule-logic-sep{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:2px 0 2px 6px;font-weight:600}
.rule-card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fff}
.rule-actions{display:flex;gap:8px}
.empty-rules{padding:48px;text-align:center;color:var(--muted2);font-size:13px;border:1.5px dashed var(--border);border-radius:var(--radius)}
.save-status{font-size:12px;font-weight:600}
.save-status.ok{color:var(--green)}.save-status.err{color:var(--red)}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(37,92,193,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
.spin-white{border-color:rgba(255,255,255,.3);border-top-color:#fff}

@media(max-width:1000px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TERRA<span>TERN</span></div>
  <div class="sub">Campaign Rulesets</div>
  <a href="/dashboard.html" class="nav-link">← Dashboard</a>
  <a href="/campaigns.html" class="nav-link">📋 Campaigns</a>
</div>

<div class="layout">
  <div class="card">
    <div class="sec-label" id="form-title">Create Rule</div>

    <div class="form-group">
      <label class="form-label">Rule Name</label>
      <input class="form-input" id="rule-name" placeholder="e.g. Germany Not Interested Reactivated"/>
    </div>

    <div class="form-group">
      <label class="form-label">Campaign</label>
      <select class="form-select" id="rule-campaign">
        <option value="">Loading campaigns...</option>
      </select>
    </div>

    <div class="fetch-bar">
      <span class="fetch-status" id="fetch-status">Fetch values to enable filter dropdowns</span>
      <button class="fetch-btn" id="fetch-all-btn" onclick="fetchAllValues()">↻ Fetch Values</button>
    </div>

    <div class="form-label" style="margin-bottom:10px">Filters</div>
    <div class="filter-list" id="filter-list"></div>
    <button class="add-filter-btn" onclick="addFilter()">+ Add Filter</button>

    <div class="btn-row">
      <button class="btn-preview" id="preview-btn" onclick="previewLeads()">◑ Preview Leads</button>
    </div>
    <div id="preview-area"></div>

    <div class="divider"></div>

    <div class="btn-row">
      <button class="btn" onclick="saveRule()">Save Rule</button>
      <button class="btn-ghost" onclick="resetForm()">Clear</button>
      <span class="save-status" id="save-status"></span>
    </div>
    <div style="font-size:12px;margin-top:10px;font-weight:600" id="form-msg"></div>
  </div>

  <div>
    <div class="rules-toolbar">
      <div class="sec-label">Saved Rules <span id="rule-count" style="color:var(--blue)"></span></div>
      <button class="btn-ghost" style="padding:6px 12px;font-size:11px" onclick="loadRulesFromAPI()">↻ Refresh</button>
    </div>
    <div id="rules-list"><div class="empty-rules">Loading rules...</div></div>
  </div>
</div>

<script>
const METABASE_PROXY = "/api/metabase-proxy";
const RULES_API      = "/api/rules";
const CAMPAIGNS_API  = "/api/campaigns";

const FIELDS = [
  'current_lead_status','current_lead_stage','application','mql_status',
  'webinar_booked','webinar_attended','state','utm_source',
  'latest_utm_campaign','bde','otp_verified'
];
const OPERATORS = [
  {value:'is',           label:'is',               needsVal:true},
  {value:'is_not',       label:'is not',           needsVal:true},
  {value:'contains',     label:'contains',         needsVal:true},
  {value:'not_contains', label:'does not contain', needsVal:true},
  {value:'has_value',    label:'has any value',    needsVal:false},
  {value:'is_empty',     label:'is empty / null',  needsVal:false},
];

let rules         = [];
let filters       = [];
let editId        = null;
let leadsCache    = null;
let fieldValCache = {};
let fetchedOnce   = false;

window.onload = () => {
  addFilter(true); addFilter(false);
  loadRulesFromAPI();
  loadCampaignDropdown();
};

async function loadCampaignDropdown() {
  try {
    const res  = await fetch(CAMPAIGNS_API);
    const data = await res.json();
    const sel  = document.getElementById('rule-campaign');
    const camps= (data.campaigns||[]).filter(c=>c.active);
    if (!camps.length) {
      sel.innerHTML = '<option value="">No active campaigns — add one first</option>';
      return;
    }
    sel.innerHTML = camps.map(c=>`<option value="${c.campaign_name}">${c.campaign_name}</option>`).join('');
  } catch(e) {
    document.getElementById('rule-campaign').innerHTML = '<option value="">Failed to load</option>';
  }
}

async function loadRulesFromAPI() {
  try {
    const res  = await fetch(RULES_API);
    const data = await res.json();
    rules = data.rules||[];
    renderRules();
  } catch(e) {
    document.getElementById('rules-list').innerHTML =
      `<div class="empty-rules" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

// ── FETCH VALUES ──────────────────────────────────────────────
async function fetchAllValues() {
  const btn=document.getElementById('fetch-all-btn');
  const status=document.getElementById('fetch-status');
  btn.disabled=true; btn.innerHTML='<span class="spin spin-white"></span>Fetching...';
  status.className='fetch-status'; status.textContent='Fetching from Metabase...';
  try {
    leadsCache=null;
    const leads=await fetchLeads();
    fieldValCache={};
    FIELDS.forEach(field=>{
      const seen=new Set(); const nonNull=[]; let hasEmpty=false;
      leads.forEach(r=>{
        const raw=r[field];
        const v=(raw===null||raw===undefined||String(raw).trim()==='') ? null : String(raw).trim();
        if (v===null) hasEmpty=true;
        else if (!seen.has(v)){ seen.add(v); nonNull.push(v); }
      });
      nonNull.sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base',numeric:true}));
      fieldValCache[field]=hasEmpty?[...nonNull,'']:nonNull;
    });
    fetchedOnce=true;
    status.className='fetch-status ok';
    status.textContent=`✓ Fetched ${leads.length} leads — dropdowns ready`;
    renderFilterList();
  } catch(e) {
    status.className='fetch-status err';
    status.textContent='Fetch failed: '+e.message;
  }
  btn.disabled=false; btn.innerHTML='↻ Fetch Values';
}

// ── FILTERS ───────────────────────────────────────────────────
function addFilter() { filters.push({logic:'AND',field:FIELDS[0],op:'is',val:''}); renderFilterList(); }

function renderFilterList() {
  const list=document.getElementById('filter-list');
  if (!filters.length){ list.innerHTML=''; return; }
  if (fetchedOnce) {
    filters.forEach(f=>{
      const vals=fieldValCache[f.field]||[];
      const curOp=OPERATORS.find(o=>o.value===f.op);
      if (curOp?.needsVal&&vals.length&&!vals.includes(f.val)) f.val=vals[0];
    });
  }
  list.innerHTML=filters.map((f,i)=>{
    const fieldOpts=FIELDS.map(ff=>`<option value="${ff}" ${f.field===ff?'selected':''}>${ff}</option>`).join('');
    const opOpts=OPERATORS.map(o=>`<option value="${o.value}" ${f.op===o.value?'selected':''}>${o.label}</option>`).join('');
    const curOp=OPERATORS.find(o=>o.value===f.op);
    const needVal=curOp?curOp.needsVal:true;
    let valEl='';
    if (!needVal) {
      valEl=`<select disabled><option>—</option></select>`;
    } else if (!fetchedOnce) {
      valEl=`<select disabled><option>— fetch values first —</option></select>`;
    } else {
      const vals=fieldValCache[f.field]||[];
      if (!vals.length){ valEl=`<select disabled><option>— no values —</option></select>`; }
      else {
        const opts=vals.map(v=>{
          const display=v===''?'(empty / null)':escHtml(v);
          return `<option value="${escHtml(v)}" ${f.val===v?'selected':''}>${display}</option>`;
        }).join('');
        valEl=`<select onchange="updateFilter(${i},'val',this.value)">${opts}</select>`;
      }
    }
    const logicEl=i===0
      ?`<div class="lt-spacer"></div>`
      :`<div class="logic-toggle">
          <button class="lt-btn ${f.logic==='AND'?'active':''}" onclick="setFilterLogic(${i},'AND')">AND</button>
          <button class="lt-btn ${f.logic==='OR'?'active':''}"  onclick="setFilterLogic(${i},'OR')">OR</button>
        </div>`;
    return `<div class="filter-row">
      <div class="filter-top">
        ${logicEl}
        <select style="flex:1" onchange="updateFilter(${i},'field',this.value)">${fieldOpts}</select>
        <select style="flex:1" onchange="updateFilter(${i},'op',this.value)">${opOpts}</select>
      </div>
      <div class="filter-bottom">${valEl}<button class="remove-btn" onclick="removeFilter(${i})">×</button></div>
    </div>`;
  }).join('');
}

function updateFilter(i,key,val) {
  filters[i][key]=val;
  if (key==='field'){ const vals=fieldValCache[val]||[]; filters[i].val=vals.length?vals[0]:''; renderFilterList(); }
  if (key==='op')   { const vals=fieldValCache[filters[i].field]||[]; filters[i].val=vals.length?vals[0]:''; renderFilterList(); }
}
function setFilterLogic(i,val){ filters[i].logic=val; renderFilterList(); }
function removeFilter(i){ filters.splice(i,1); renderFilterList(); }

async function fetchLeads() {
  if (leadsCache) return leadsCache;
  const res=await fetch(METABASE_PROXY);
  const data=await res.json();
  if (!Array.isArray(data)) throw new Error('Bad response');
  leadsCache=data; return leadsCache;
}

// ── PREVIEW ───────────────────────────────────────────────────
async function previewLeads() {
  const area=document.getElementById('preview-area');
  const btn=document.getElementById('preview-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Fetching...'; area.innerHTML='';
  try {
    const leads=await fetchLeads();
    const matched=applyFilters(leads,filters);
    area.innerHTML=`<div class="preview-box">
      <div class="preview-count">${matched.length}</div>
      <div class="preview-sublabel">leads matched</div>
      ${matched.length?`<div class="preview-table-wrap"><table class="preview-table">
        <thead><tr><th>Name</th><th>Mobile</th><th>Application</th><th>Status</th><th>utm_campaign</th></tr></thead>
        <tbody>${matched.slice(0,50).map(r=>`<tr>
          <td>${escHtml(r.fullname||'—')}</td><td>${escHtml(r.mobile||'—')}</td>
          <td style="font-size:10px">${escHtml(String(r.application||'—').slice(0,28))}</td>
          <td>${escHtml(r.current_lead_status||'—')}</td>
          <td style="color:${r.latest_utm_campaign?'var(--blue)':'var(--muted2)'}">${escHtml(r.latest_utm_campaign||'(null)')}</td>
        </tr>`).join('')}</tbody>
      </table>${matched.length>50?`<div style="font-size:11px;color:var(--muted);padding:8px 10px">Showing 50 of ${matched.length}</div>`:''}</div>`:''}
    </div>`;
  } catch(e) {
    area.innerHTML=`<div style="font-size:12px;color:var(--red);margin-top:10px">Error: ${e.message}</div>`;
  }
  btn.disabled=false; btn.innerHTML='◑ Preview Leads';
}

function applyFilters(leads,filterList) {
  if (!filterList?.length) return leads;
  return leads.filter(lead=>{
    let result=evalFilter(lead,filterList[0]);
    for (let i=1;i<filterList.length;i++){
      const test=evalFilter(lead,filterList[i]);
      result=filterList[i].logic==='OR'?result||test:result&&test;
    }
    return result;
  });
}
function evalFilter(lead,f) {
  const raw=lead[f.field]; const cell=String(raw??'').toLowerCase().trim(); const val=String(f.val??'').toLowerCase().trim();
  switch(f.op){
    case 'is':           return cell===val;
    case 'is_not':       return cell!==val;
    case 'contains':     return cell.includes(val);
    case 'not_contains': return !cell.includes(val);
    case 'has_value':    return raw!==null&&raw!==undefined&&String(raw).trim()!=='';
    case 'is_empty':     return raw===null||raw===undefined||String(raw).trim()==='';
    default:             return true;
  }
}

// ── SAVE RULE ─────────────────────────────────────────────────
async function saveRule() {
  const name=document.getElementById('rule-name').value.trim();
  const campaign=document.getElementById('rule-campaign').value;
  const ss=document.getElementById('save-status');
  if (!name)           { showMsg('Rule name is required.','var(--red)'); return; }
  if (!campaign)       { showMsg('Select a campaign.','var(--red)'); return; }
  if (!filters.length) { showMsg('Add at least one filter.','var(--red)'); return; }
  const valid=filters.filter(f=>{ const op=OPERATORS.find(o=>o.value===f.op); return op&&(op.needsVal===false||f.val!==''); });
  if (!valid.length)   { showMsg('Set filter values first.','var(--red)'); return; }

  ss.textContent='Saving...'; ss.className='save-status';
  try {
    const rule={id:editId||Date.now().toString(36),name,campaign,filters:valid,active:true,created_at:new Date().toISOString()};
    const res=await fetch(RULES_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rule)});
    const data=await res.json();
    if (data.error) throw new Error(data.error);
    await loadRulesFromAPI(); resetForm();
    ss.className='save-status ok'; ss.textContent='✓ Saved';
    setTimeout(()=>ss.textContent='',3000);
  } catch(e) { ss.className='save-status err'; ss.textContent='Failed: '+e.message; }
}

function showMsg(txt,color){ const el=document.getElementById('form-msg'); el.textContent=txt; el.style.color=color; }

async function toggleRule(id) {
  const rule=rules.find(r=>r.id===id); if(!rule) return;
  try {
    await fetch(`${RULES_API}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active:!rule.active})});
    await loadRulesFromAPI();
  } catch(e) { alert('Failed: '+e.message); }
}

async function deleteRule(id) {
  if (!confirm('Delete this rule?')) return;
  try {
    await fetch(`${RULES_API}/${id}`,{method:'DELETE'});
    rules=rules.filter(r=>r.id!==id); renderRules();
  } catch(e) { alert('Failed: '+e.message); }
}

function editRule(id) {
  const rule=rules.find(r=>r.id===id); if(!rule) return;
  editId=id;
  document.getElementById('rule-name').value=rule.name;
  document.getElementById('rule-campaign').value=rule.campaign;
  filters=rule.filters.map(f=>({...f}));
  renderFilterList();
  document.getElementById('form-title').textContent='Edit Rule';
  document.getElementById('form-msg').textContent='';
  document.getElementById('preview-area').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderRules() {
  const list=document.getElementById('rules-list');
  document.getElementById('rule-count').textContent=rules.length?`(${rules.length})`:'';
  if (!rules.length){ list.innerHTML='<div class="empty-rules">No rules yet. Create one on the left.</div>'; return; }
  list.innerHTML=rules.map(rule=>{
    const pills=rule.filters.map((f,i)=>{
      const opLabel=OPERATORS.find(o=>o.value===f.op)?.label||f.op;
      const needVal=OPERATORS.find(o=>o.value===f.op)?.needsVal;
      const valPart=needVal?`<span class="rval">${f.val===''?'(empty)':escHtml(f.val)}</span>`:'';
      const sep=i<rule.filters.length-1?`<div class="rule-logic-sep">${rule.filters[i+1].logic}</div>`:'';
      return `<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <div class="rule-filter-pill"><span class="rfield">${f.field}</span><span class="rop">${opLabel}</span>${valPart}</div>${sep}
      </div>`;
    }).join('');
    return `<div class="rule-card ${rule.active?'active-rule':''}">
      <div class="rule-card-header">
        <div><div class="rule-card-name">${escHtml(rule.name)}</div><div class="rule-card-campaign">▶ ${rule.campaign}</div></div>
        <span class="status-badge ${rule.active?'active':'paused'}" onclick="toggleRule('${rule.id}')">${rule.active?'ACTIVE':'PAUSED'}</span>
      </div>
      <div class="rule-card-body">${pills}</div>
      <div class="rule-card-footer">
        <span style="font-size:11px;color:var(--muted)">${fmtDate(rule.created_at)}</span>
        <div class="rule-actions">
          <button class="btn-ghost" style="padding:5px 12px;font-size:11px" onclick="editRule('${rule.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteRule('${rule.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function resetForm() {
  editId=null; leadsCache=null; filters=[];
  document.getElementById('rule-name').value='';
  document.getElementById('form-title').textContent='Create Rule';
  document.getElementById('preview-area').innerHTML='';
  document.getElementById('form-msg').textContent='';
  addFilter(true); addFilter(false); renderFilterList();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso){ try{ return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return '—'; } }
</script>
</body>
</html>
