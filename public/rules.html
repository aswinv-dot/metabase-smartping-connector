<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Campaign Rulesets</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--muted:#555;--muted2:#888;
  --lime:#C5FF00;--red:#ff4d4d;--green:#4dff91;--amber:#ffb84d;
  --font:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:80px}

.header{display:flex;align-items:center;gap:16px;padding:18px 32px;border-bottom:1px solid var(--border);background:#0d0d0d}
.logo{font-size:20px;font-weight:900;letter-spacing:4px;color:#fff}.logo span{color:var(--lime)}
.sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;flex:1}
.nav-link{font-size:11px;color:var(--muted2);text-decoration:none;border:1px solid var(--border2);padding:6px 14px;border-radius:3px;letter-spacing:1px;transition:all .15s}
.nav-link:hover{border-color:var(--lime);color:var(--lime)}

.layout{display:grid;grid-template-columns:420px 1fr;gap:1px;background:var(--border);min-height:calc(100vh - 57px)}
.left{background:var(--bg);padding:28px 32px}
.right{background:var(--bg);padding:28px 32px}

.sec-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;display:block}
.form-input{width:100%;background:#111;border:1px solid var(--border2);color:var(--text);padding:9px 12px;font-family:var(--font);font-size:12px;border-radius:3px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--lime)}
.form-select{width:100%;background:#111;border:1px solid var(--border2);color:var(--text);padding:9px 12px;font-family:var(--font);font-size:12px;border-radius:3px;outline:none;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--lime)}

/* LOGIC TOGGLE */
.logic-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logic-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)}
.toggle-group{display:flex;border:1px solid var(--border2);border-radius:3px;overflow:hidden}
.toggle-btn{background:transparent;border:none;color:var(--muted2);padding:6px 16px;cursor:pointer;font-family:var(--font);font-size:11px;letter-spacing:1px;transition:all .15s}
.toggle-btn.active{background:var(--lime);color:#000;font-weight:700}

/* FILTER ROWS */
.filter-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr 1fr 28px;gap:6px;align-items:center}
.filter-row select,.filter-row input{background:#111;border:1px solid var(--border2);color:var(--text);padding:7px 10px;font-family:var(--font);font-size:11px;border-radius:3px;outline:none;width:100%}
.filter-row select:focus,.filter-row input:focus{border-color:var(--lime)}
.remove-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);width:28px;height:32px;cursor:pointer;font-size:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--font)}
.remove-btn:hover{border-color:var(--red);color:var(--red)}

.add-filter-btn{background:transparent;border:1px dashed var(--border2);color:var(--muted2);padding:7px 14px;cursor:pointer;font-family:var(--font);font-size:11px;letter-spacing:1px;border-radius:3px;width:100%;transition:all .15s;margin-bottom:16px}
.add-filter-btn:hover{border-color:var(--lime);color:var(--lime)}

/* BUTTONS */
.btn-primary{background:var(--lime);color:#000;border:none;padding:10px 24px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:3px;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border2);padding:10px 18px;cursor:pointer;font-family:var(--font);font-size:11px;letter-spacing:1px;border-radius:3px;transition:all .15s}
.btn-ghost:hover{border-color:var(--lime);color:var(--lime)}
.btn-danger{background:transparent;color:var(--muted);border:1px solid var(--border2);padding:5px 10px;cursor:pointer;font-family:var(--font);font-size:10px;letter-spacing:.5px;border-radius:3px;transition:all .15s}
.btn-danger:hover{border-color:var(--red);color:var(--red)}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:4px}

/* RULES LIST */
.rules-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.rules-toolbar .sec-label{margin-bottom:0;flex:1}
.import-label{background:transparent;color:var(--muted2);border:1px solid var(--border2);padding:7px 14px;cursor:pointer;font-family:var(--font);font-size:11px;letter-spacing:1px;border-radius:3px;transition:all .15s;display:inline-block}
.import-label:hover{border-color:var(--lime);color:var(--lime)}
#import-input{display:none}

.rule-card{border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:12px;transition:border-color .2s}
.rule-card.active-rule{border-color:#3a5500}
.rule-card-header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.rule-card-name{font-size:13px;font-weight:700;letter-spacing:.5px;color:#fff}
.rule-card-campaign{font-size:10px;color:var(--muted2);margin-top:2px;letter-spacing:.5px}
.rule-card-badges{display:flex;align-items:center;gap:8px}
.status-badge{font-size:9px;padding:2px 8px;border-radius:2px;letter-spacing:1px;cursor:pointer;border:1px solid transparent;font-family:var(--font)}
.status-badge.active{background:#1a2200;color:var(--lime);border-color:#3a5500}
.status-badge.paused{background:#1a1a1a;color:var(--muted);border-color:var(--border2)}
.rule-card-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.rule-filter-pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:3px 8px;color:var(--muted2)}
.rule-filter-pill .field{color:var(--text)}
.rule-filter-pill .op{color:var(--amber);font-size:9px}
.rule-filter-pill .val{color:var(--lime)}
.rule-logic-sep{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:2px 0 2px 4px}
.rule-card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.rule-actions{display:flex;gap:8px}
.empty-rules{padding:48px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:1px;border:1px solid var(--border);border-radius:4px}

.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .left,.right{padding:20px 16px}
  .filter-row{grid-template-columns:1fr 1fr}
  .filter-row .val-input,.filter-row .remove-btn{grid-column:span 1}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TERRATERN<span>.</span></div>
  <div class="sub">Campaign Rulesets</div>
  <a href="/dashboard.html" class="nav-link">&#8592; Dashboard</a>
</div>

<div class="layout">

  <!-- LEFT: Rule builder -->
  <div class="left">
    <div class="sec-label" id="form-title">Create Rule</div>

    <div class="form-group">
      <label class="form-label">Rule Name</label>
      <input class="form-input" id="rule-name" placeholder="e.g. Germany Not Interested Reactivated"/>
    </div>

    <div class="form-group">
      <label class="form-label">Campaign</label>
      <select class="form-select" id="rule-campaign">
        <option value="ghcalum_api">ghcalum_api — Germany Healthcare Alumni</option>
      </select>
    </div>

    <div class="logic-row">
      <span class="logic-label">Filter Logic</span>
      <div class="toggle-group">
        <button class="toggle-btn active" id="logic-and" onclick="setLogic('AND')">AND</button>
        <button class="toggle-btn" id="logic-or" onclick="setLogic('OR')">OR</button>
      </div>
      <span style="font-size:10px;color:var(--muted)" id="logic-hint">All filters must match</span>
    </div>

    <div class="form-label" style="margin-bottom:8px">Filters</div>
    <div class="filter-list" id="filter-list"></div>
    <button class="add-filter-btn" onclick="addFilter()">+ Add Filter</button>

    <hr class="divider"/>

    <div class="btn-row">
      <button class="btn-primary" onclick="saveRule()">Save Rule</button>
      <button class="btn-ghost" onclick="resetForm()">Clear</button>
    </div>
    <div style="font-size:11px;color:var(--lime);margin-top:10px;letter-spacing:.5px" id="form-msg"></div>
  </div>

  <!-- RIGHT: Saved rules -->
  <div class="right">
    <div class="rules-toolbar">
      <div class="sec-label">Saved Rules <span id="rule-count" style="color:var(--lime)"></span></div>
      <label class="import-label">&#8593; Import JSON<input type="file" id="import-input" accept=".json" onchange="importRules(event)"/></label>
      <button class="btn-ghost" onclick="exportRules()">&#8595; Export JSON</button>
    </div>
    <div id="rules-list"></div>
  </div>

</div>

<script>
const FIELDS = [
  {value:'current_lead_status',  label:'current_lead_status'},
  {value:'current_lead_stage',   label:'current_lead_stage'},
  {value:'application',          label:'application'},
  {value:'mql_status',           label:'mql_status'},
  {value:'webinar_booked',       label:'webinar_booked'},
  {value:'webinar_attended',     label:'webinar_attended'},
  {value:'state',                label:'state'},
  {value:'utm_source',           label:'utm_source'},
  {value:'latest_utm_campaign',  label:'latest_utm_campaign'},
  {value:'bde',                  label:'bde'},
  {value:'otp_verified',         label:'otp_verified'},
];

const OPERATORS = [
  {value:'is',             label:'is'},
  {value:'is_not',         label:'is not'},
  {value:'contains',       label:'contains'},
  {value:'not_contains',   label:'does not contain'},
  {value:'has_value',      label:'has any value'},
  {value:'is_empty',       label:'is empty / null'},
];

const VALUE_LESS = ['has_value','is_empty'];

let rules   = loadRules();
let logic   = 'AND';
let editId  = null;
let filters = [];

// ── INIT ──────────────────────────────────────────────────────
window.onload = () => {
  addFilter();
  addFilter();
  loadPreset();
  renderRules();
};

function loadPreset() {
  // Pre-load the Germany Not Interested Reactivated example if no rules yet
  if (rules.length === 0) {
    filters = [
      { field:'current_lead_status', op:'is',        val:'Not Interested' },
      { field:'application',         op:'contains',  val:'Germany' },
      { field:'latest_utm_campaign', op:'has_value', val:'' },
    ];
    document.getElementById('rule-name').value = 'Germany Not Interested Reactivated';
    logic = 'AND';
    updateLogicUI();
    renderFilterList();
  }
}

// ── LOGIC TOGGLE ──────────────────────────────────────────────
function setLogic(val) {
  logic = val;
  updateLogicUI();
}
function updateLogicUI() {
  document.getElementById('logic-and').className = 'toggle-btn' + (logic==='AND'?' active':'');
  document.getElementById('logic-or').className  = 'toggle-btn' + (logic==='OR' ?' active':'');
  document.getElementById('logic-hint').textContent = logic==='AND' ? 'All filters must match' : 'Any filter can match';
}

// ── FILTER ROWS ───────────────────────────────────────────────
function addFilter(f={field:'current_lead_status',op:'is',val:''}) {
  filters.push({...f});
  renderFilterList();
}

function renderFilterList() {
  const list = document.getElementById('filter-list');
  if (!filters.length) { list.innerHTML=''; return; }

  list.innerHTML = filters.map((f,i) => {
    const fieldOpts  = FIELDS.map(o => `<option value="${o.value}" ${f.field===o.value?'selected':''}>${o.label}</option>`).join('');
    const opOpts     = OPERATORS.map(o => `<option value="${o.value}" ${f.op===o.value?'selected':''}>${o.label}</option>`).join('');
    const noVal      = VALUE_LESS.includes(f.op);
    const valInput   = noVal
      ? `<input class="val-input" disabled placeholder="—" style="opacity:.3;cursor:not-allowed"/>`
      : `<input class="val-input" value="${escHtml(f.val)}" placeholder="value" oninput="updateFilter(${i},'val',this.value)"/>`;

    return `<div class="filter-row">
      <select onchange="updateFilter(${i},'field',this.value)">${fieldOpts}</select>
      <select onchange="updateFilter(${i},'op',this.value)">${opOpts}</select>
      ${valInput}
      <button class="remove-btn" onclick="removeFilter(${i})">&#215;</button>
    </div>`;
  }).join('');
}

function updateFilter(i, key, val) {
  filters[i][key] = val;
  if (key === 'op') renderFilterList();
}

function removeFilter(i) {
  filters.splice(i,1);
  renderFilterList();
}

// ── SAVE RULE ─────────────────────────────────────────────────
function saveRule() {
  const name     = document.getElementById('rule-name').value.trim();
  const campaign = document.getElementById('rule-campaign').value;
  const msg      = document.getElementById('form-msg');

  if (!name)            { msg.textContent='Rule name is required.'; msg.style.color='var(--red)'; return; }
  if (!filters.length)  { msg.textContent='Add at least one filter.'; msg.style.color='var(--red)'; return; }

  const validFilters = filters.filter(f => f.field && f.op && (VALUE_LESS.includes(f.op) || f.val.trim()));
  if (!validFilters.length) { msg.textContent='Fill in filter values.'; msg.style.color='var(--red)'; return; }

  if (editId) {
    const idx = rules.findIndex(r => r.id === editId);
    if (idx > -1) rules[idx] = { ...rules[idx], name, campaign, logic, filters: validFilters };
    editId = null;
    document.getElementById('form-title').textContent = 'Create Rule';
  } else {
    rules.push({ id: Date.now().toString(36), name, campaign, logic, filters: validFilters, active: true, created: new Date().toISOString() });
  }

  saveRules();
  renderRules();
  resetForm();
  msg.textContent = 'Rule saved.';
  msg.style.color = 'var(--lime)';
  setTimeout(() => msg.textContent='', 2000);
}

// ── EDIT / DELETE / TOGGLE ────────────────────────────────────
function editRule(id) {
  const rule = rules.find(r => r.id === id);
  if (!rule) return;
  editId = id;
  document.getElementById('rule-name').value = rule.name;
  document.getElementById('rule-campaign').value = rule.campaign;
  logic = rule.logic || 'AND';
  filters = rule.filters.map(f => ({...f}));
  updateLogicUI();
  renderFilterList();
  document.getElementById('form-title').textContent = 'Edit Rule';
  document.getElementById('form-msg').textContent = '';
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteRule(id) {
  rules = rules.filter(r => r.id !== id);
  saveRules();
  renderRules();
}

function toggleRule(id) {
  const rule = rules.find(r => r.id === id);
  if (rule) { rule.active = !rule.active; saveRules(); renderRules(); }
}

// ── RENDER RULES ──────────────────────────────────────────────
function renderRules() {
  const list = document.getElementById('rules-list');
  document.getElementById('rule-count').textContent = rules.length ? `(${rules.length})` : '';

  if (!rules.length) {
    list.innerHTML = '<div class="empty-rules">No rules yet. Create one on the left.</div>';
    return;
  }

  list.innerHTML = rules.map(rule => {
    const filterPills = rule.filters.map((f,i) => {
      const opLabel = OPERATORS.find(o=>o.value===f.op)?.label || f.op;
      const valPart = VALUE_LESS.includes(f.op) ? '' : `<span class="val">${escHtml(f.val)}</span>`;
      const sep = i < rule.filters.length-1
        ? `<div class="rule-logic-sep">${rule.logic}</div>` : '';
      return `<div class="rule-filter-pill">
        <span class="field">${f.field}</span>
        <span class="op">${opLabel}</span>
        ${valPart}
      </div>${sep}`;
    }).join('');

    return `<div class="rule-card ${rule.active?'active-rule':''}">
      <div class="rule-card-header">
        <div>
          <div class="rule-card-name">${escHtml(rule.name)}</div>
          <div class="rule-card-campaign">&#9654; ${rule.campaign}</div>
        </div>
        <div class="rule-card-badges">
          <span class="status-badge ${rule.active?'active':'paused'}" onclick="toggleRule('${rule.id}')">
            ${rule.active ? 'ACTIVE' : 'PAUSED'}
          </span>
        </div>
      </div>
      <div class="rule-card-body">${filterPills}</div>
      <div class="rule-card-footer">
        <span style="font-size:10px;color:var(--muted)">Logic: ${rule.logic} &nbsp;|&nbsp; Created: ${fmtDate(rule.created)}</span>
        <div class="rule-actions">
          <button class="btn-ghost" style="padding:5px 12px;font-size:10px" onclick="editRule('${rule.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteRule('${rule.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── RESET FORM ────────────────────────────────────────────────
function resetForm() {
  editId = null;
  filters = [];
  logic = 'AND';
  document.getElementById('rule-name').value = '';
  document.getElementById('rule-campaign').value = 'ghcalum_api';
  document.getElementById('form-title').textContent = 'Create Rule';
  updateLogicUI();
  addFilter();
  renderFilterList();
}

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exportRules() {
  if (!rules.length) { alert('No rules to export.'); return; }
  const blob = new Blob([JSON.stringify(rules, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'smartping-rules.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importRules(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      rules = imported;
      saveRules();
      renderRules();
      alert(`Imported ${rules.length} rules.`);
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── PERSIST ───────────────────────────────────────────────────
function saveRules()  { try { localStorage.setItem('sp_rules', JSON.stringify(rules)); } catch(e){} }
function loadRules()  { try { return JSON.parse(localStorage.getItem('sp_rules') || '[]'); } catch(e){ return []; } }

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return '—'; } }
</script>
</body>
</html>
